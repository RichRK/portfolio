[config.site]
title = "Rich King"
description = "A personal software engineering portfolio"
pageTitle = "Rich King | Portfolio"
pageDescription = "A personal software engineering portfolio"
repository = "https://github.com/RichRK/portfolio"
footerNote = ""

[config.theme]
# Available palettes:
# green-soft, green-vivid, rose-soft, pink-soft, purple-soft, blue-soft, orange-soft, brown-soft
palette = "green-soft"

[config.code]
lightTheme = "catppuccin-latte"
darkTheme = "catppuccin-macchiato"
lineNumbers = true
wrap = true
preserveIndent = true
collapseStyle = "collapsible-auto"

[config.comments]
enabled = false
provider = "giscus"
show_on_posts = false

[config.search]
enabled = true
shortcut = "mod+k"
placeholder = "Search notes..."
maxResults = 6

[config.blog]
postsPerPage = 6

[config.comments.giscus]
repo = "dodolalorc/astro-navfolio"
repo_id = "R_kgDOSaQejw"
category = "Announcements"
category_id = "DIC_kwDOSaQej84C9di9"
mapping = "pathname"
strict = "0"
reactions_enabled = "1"
emit_metadata = "0"
input_position = "top"
light_theme = "light"
dark_theme = "dark"
lang = "zh-CN"
loading = "lazy"

[config.comments.utterances]
repo = ""
issue_term = "pathname"
label = "comment"
theme = "github-light"

[config.comments.waline]
server_url = ""
lang = "zh-CN"
dark = "html.dark"
pageview = true
comment = true

[config.profile]
name = "navfolio"
handle = "@navfolio"
role = "A Cat Developer"
company = "Independent Studio"
location = "Remote"
email = "hello@navfolio.site"
website = "https://astro.navfolio.site/"
github = "https://github.com/dodolalorc/astro-navfolio"
meta = "Open-source maintainer"
avatar = "/images/logo.png"

[[config.topNav.links]]
label = "Blog"
href = "/"

[[config.topNav.links]]
label = "About"
href = "/about"
